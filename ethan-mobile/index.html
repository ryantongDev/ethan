<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ethan 手机版</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:radial-gradient(circle at top,#2563eb,#0f172a 62%,#020617);color:#fff;padding:18px} .wrap{width:min(100%,720px);margin:0 auto}.hero,.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:22px;margin-bottom:16px}.hero h1{margin:0 0 10px;font-size:32px}.sub{color:#dbeafe;line-height:1.7}.grid{display:grid;gap:14px}.card{padding:18px;text-decoration:none;color:#fff;display:block}.emoji{font-size:34px;margin-bottom:8px}.title{font-size:22px;font-weight:900;margin-bottom:8px}.meta{color:#cbd5e1;line-height:1.6}.foot{margin-top:12px;color:#93c5fd;font-weight:800}.tag{display:inline-block;background:rgba(34,197,94,.18);color:#dcfce7;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="tag">独立手机版</div>
      <h1>📱 Ethan 手机版</h1>
      <div class="sub">这是单独给手机 / iPad 做的 Ethan 小网站。按钮更大，操作更偏触屏，不和原来的 `/ethan/` 混在一起。</div>
    </div>
    <div class="grid">
      <a class="card" href="/ethan-mobile/shooter/"><div class="emoji">🚀</div><div class="title">手机版射击</div><div class="meta">专门按手机操作做，左手拖动移动，右侧开火，更适合触屏。</div><div class="foot">进入游戏 →</div></a>
      <a class="card" href="/ethan/"><div class="emoji">🏠</div><div class="title">返回原 Ethan 站</div><div class="meta">原版 Ethan 小网站继续保留，手机版独立存在。</div><div class="foot">回到原站 →</div></a>
    </div>
  </div>
</body>
</html>
