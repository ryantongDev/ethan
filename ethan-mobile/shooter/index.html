<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Ethan 手机版射击</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:#020617;color:#fff;font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}body{touch-action:none}.app{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom)}.top{display:flex;justify-content:space-between;gap:8px;padding:10px 2px}.badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:8px 12px;font-weight:800}.title{text-align:center;font-size:24px;font-weight:900;margin:0 0 8px}.sub{text-align:center;color:#93c5fd;font-size:13px;margin-bottom:10px}.game-wrap{flex:1;min-height:0;display:flex;justify-content:center;align-items:center}canvas{width:100%;max-width:560px;aspect-ratio:9/16;background:linear-gradient(180deg,#0f172a,#1d4ed8 55%,#0f172a);border:2px solid rgba(96,165,250,.65);border-radius:22px;box-shadow:0 18px 48px rgba(0,0,0,.35)}.controls{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;padding:12px 0 4px}.pad,.fire{border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;min-height:108px;font-weight:900}.fire{background:linear-gradient(180deg,#fb923c,#ef4444);font-size:28px}.tip{text-align:center;color:#bfdbfe;font-size:12px;padding-bottom:4px}
  </style>
</head>
<body>
<div class="app"><div class="top"><div class="badge" id="score">分数：0</div><div class="badge" id="hp">生命：6</div></div><div class="title">🚀 Ethan 手机版射击</div><div class="sub">左边拖动移动，右边按钮开火，专门给手机触屏做</div><div class="game-wrap"><canvas id="game" width="540" height="960"></canvas></div><div class="controls"><div class="pad" id="pad">左手拖动移动</div><div class="fire" id="fire">开火</div></div><div class="tip">手机版独立站，后面还能继续加更多专属小游戏</div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');const scoreEl=document.getElementById('score'),hpEl=document.getElementById('hp');const pad=document.getElementById('pad'),fireBtn=document.getElementById('fire');let score=0,hp=6,over=false,last=0,enemyTimer=0,shootCooldown=0;let bullets=[],enemies=[],particles=[];let player={x:270,y:850,w:58,h:34,speed:360,vx:0};const touch={move:false,dir:0,fire:false};const audioCtx=new (window.AudioContext||window.webkitAudioContext)();function s(type){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(480,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(220,audioCtx.currentTime+.06);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.05,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);}else{o.type='triangle';o.frequency.setValueAtTime(180,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(90,audioCtx.currentTime+.1);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.08,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.11);}o.start();o.stop(audioCtx.currentTime+.12)}
function hud(){scoreEl.textContent=`分数：${score}`;hpEl.textContent=`生命：${hp}`;}function boom(x,y,color){for(let i=0;i<10;i++)particles.push({x,y,vx:(Math.random()-.5)*220,vy:(Math.random()-.5)*220,life:.35+Math.random()*.25,color});}
function spawnEnemy(){const big=Math.random()>.78;const size=big?48:30+Math.random()*8;enemies.push({x:40+Math.random()*(c.width-80),y:-size,size,hp:big?3:1,speed:big?110:145});}
function shoot(){bullets.push({x:player.x,y:player.y-20,r:6,speed:760});s('shoot');}
function reset(){score=0;hp=6;over=false;enemyTimer=0;shootCooldown=0;bullets=[];enemies=[];particles=[];player.x=270;hud();}
function bindPad(){let startX=0;const begin=e=>{touch.move=true;const p=e.touches?e.touches[0]:e;startX=p.clientX;pad.style.background='rgba(96,165,250,.22)';e.preventDefault();};const move=e=>{if(!touch.move)return;const p=e.touches?e.touches[0]:e;const dx=p.clientX-startX;touch.dir=Math.max(-1,Math.min(1,dx/40));e.preventDefault();};const end=e=>{touch.move=false;touch.dir=0;pad.style.background='rgba(255,255,255,.08)';e.preventDefault();};pad.addEventListener('touchstart',begin,{passive:false});pad.addEventListener('touchmove',move,{passive:false});pad.addEventListener('touchend',end,{passive:false});pad.addEventListener('mousedown',begin);window.addEventListener('mousemove',move);window.addEventListener('mouseup',end);}bindPad();
const fireOn=e=>{touch.fire=true;fireBtn.style.transform='scale(.98)';if(over)reset();e.preventDefault();}; const fireOff=e=>{touch.fire=false;fireBtn.style.transform='scale(1)';e.preventDefault();}; fireBtn.addEventListener('touchstart',fireOn,{passive:false}); fireBtn.addEventListener('touchend',fireOff,{passive:false}); fireBtn.addEventListener('mousedown',fireOn); fireBtn.addEventListener('mouseup',fireOff); fireBtn.addEventListener('mouseleave',fireOff);
function update(dt){if(over)return;player.x+=touch.dir*player.speed*dt;player.x=Math.max(player.w/2,Math.min(c.width-player.w/2,player.x));enemyTimer-=dt;shootCooldown-=dt;if(enemyTimer<=0){spawnEnemy();enemyTimer=Math.max(.5,1.15-score*.004);}if(touch.fire&&shootCooldown<=0){shoot();shootCooldown=.14;}bullets.forEach(b=>b.y-=b.speed*dt);enemies.forEach(e=>e.y+=e.speed*dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;});bullets=bullets.filter(b=>b.y>-20);particles=particles.filter(p=>p.life>0);for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(e.y-e.size>c.height){enemies.splice(i,1);hp--;hud();if(hp<=0)over=true;continue;}for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(Math.hypot(b.x-e.x,b.y-e.y)<e.size+b.r){bullets.splice(j,1);e.hp--;if(e.hp<=0){boom(e.x,e.y,'#fb7185');score+=e.size>40?25:10;s('boom');enemies.splice(i,1);hud();}break;}}const hit=e.x+e.size>player.x-player.w/2&&e.x-e.size<player.x+player.w/2&&e.y+e.size>player.y-player.h/2&&e.y-e.size<player.y+player.h/2;if(hit){boom(player.x,player.y,'#7dd3fc');enemies.splice(i,1);hp--;hud();if(hp<=0)over=true;}}
}
function drawBg(){ctx.fillStyle='rgba(255,255,255,.05)';for(let i=0;i<60;i++){const x=(i*149)%c.width;const y=((i*117)+performance.now()*0.06*((i%3)+1))%c.height;ctx.fillRect(x,y,2,8);}ctx.strokeStyle='rgba(147,197,253,.08)';for(let r=120;r<420;r+=60){ctx.beginPath();ctx.arc(c.width/2,180,r,0,Math.PI*2);ctx.stroke();}}
function drawPlayer(){ctx.save();ctx.translate(player.x,player.y);ctx.fillStyle='#60a5fa';ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(25,18);ctx.lineTo(0,8);ctx.lineTo(-25,18);ctx.closePath();ctx.fill();ctx.fillStyle='#eff6ff';ctx.beginPath();ctx.arc(0,-6,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(56,189,248,.5)';ctx.beginPath();ctx.moveTo(-8,18);ctx.lineTo(0,34+Math.sin(performance.now()*0.03)*4);ctx.lineTo(8,18);ctx.closePath();ctx.fill();ctx.restore();}
function render(){ctx.clearRect(0,0,c.width,c.height);drawBg();bullets.forEach(b=>{ctx.fillStyle='#fde68a';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});enemies.forEach(e=>{ctx.fillStyle=e.size>40?'#f87171':'#fb7185';ctx.beginPath();ctx.arc(e.x,e.y,e.size,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e.x,e.y,Math.max(6,e.size*.18),0,Math.PI*2);ctx.fill();ctx.fillStyle='#22c55e';ctx.fillRect(e.x-e.size/2,e.y-e.size-10,e.size*(e.hp/(e.size>40?3:1)),5);});particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,5,5);ctx.globalAlpha=1;});drawPlayer();if(over){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 42px Arial';ctx.fillText('游戏结束',c.width/2,c.height/2-20);ctx.font='24px Arial';ctx.fillText(`最终分数：${score}`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(ts){const dt=Math.min(.033,(ts-last)/1000||0);last=ts;update(dt);render();requestAnimationFrame(loop)}reset();requestAnimationFrame(loop);
</script>
</body>
</html>
