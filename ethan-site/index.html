<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小网页集合</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8 60%, #0ea5e9);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: white;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(100%, 560px);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0,0,0,.25);
    }
    h1 { margin: 0 0 10px; }
    p { color: #dbeafe; line-height: 1.6; }
    .links { display: grid; gap: 12px; margin-top: 18px; }
    a {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,.1);
      padding: 16px 18px;
      border-radius: 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>小网页集合</h1>
    <p>这里放了两个页面：一个手机版射击小游戏，一个简单计数器。</p>
    <div class="links">
      <a href="/ethan/game/">进入射击小游戏</a>
      <a href="/ethan/counter/">进入计数器</a>
          <a href="/ethan/target/">进入射靶小游戏</a>
    </div>
  </div>
</body>
</html>
