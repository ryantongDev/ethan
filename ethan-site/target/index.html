<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>射靶小游戏</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #0b1220, #102347 60%, #0e7490);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .wrap { width: min(100%, 560px); }
    .top { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .badge { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15); border-radius: 999px; padding: 8px 12px; font-weight: 700; color: #dbeafe; }
    .title { text-align: center; font-size: 26px; font-weight: 900; margin: 4px 0 6px; }
    .sub { text-align: center; color: #bfdbfe; font-size: 13px; margin-bottom: 12px; }
    canvas { width: 100%; aspect-ratio: 9/16; display: block; border-radius: 22px; background: linear-gradient(180deg, #7dd3fc 0%, #93c5fd 35%, #a7f3d0 36%, #4ade80 100%); border: 2px solid rgba(255,255,255,.35); box-shadow: 0 16px 40px rgba(0,0,0,.28); }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    button, .back { border: none; border-radius: 16px; padding: 14px; font-size: 16px; font-weight: 800; color: #fff; background: rgba(255,255,255,.12); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    button:active, .back:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="badge" id="score">分数：0</div>
      <div class="badge" id="timer">时间：30</div>
      <div class="badge" id="best">最高：0</div>
    </div>
    <div class="title">射靶小游戏</div>
    <div class="sub">点中靶心得分更高，30 秒内看看你能打多少分</div>
    <canvas id="game" width="540" height="960"></canvas>
    <div class="actions">
      <button id="musicBtn">音乐：关</button>
      <a class="back" href="/ethan/">返回首页</a>
      <button id="restart">重新开始</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const bestEl = document.getElementById('best');
    const restartBtn = document.getElementById('restart');
    const BEST_KEY = 'ethan-target-best';
    let score = 0, timeLeft = 30, playing = true, lastTick = performance.now();
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    const target = { x: 270, y: 300, r: 70, vx: 160, vy: 180 };
    const pops = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const musicBtn = document.getElementById('musicBtn');
    let musicOn = false;
    let musicTimer = null;
    function bgNote(freq = 440, dur = 0.18, type = 'sine', gainValue = 0.014) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(0.001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(gainValue, audioCtx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur + 0.02);
    }
    function musicLoop() {
      if (!musicOn) return;
      const seq = [392, 523.25, 587.33, 523.25, 392, 329.63];
      seq.forEach((f, i) => setTimeout(() => bgNote(f, 0.22, 'sine', 0.012), i * 220));
      musicTimer = setTimeout(musicLoop, 1600);
    }
    function toggleMusic() {
      musicOn = !musicOn;
      musicBtn.textContent = `音乐：${musicOn ? '开' : '关'}`;
      if (musicOn) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        musicLoop();
      } else if (musicTimer) {
        clearTimeout(musicTimer);
        musicTimer = null;
      }
    }
    musicBtn.addEventListener('click', toggleMusic);

    function playTone(freq, dur=0.08) { if (audioCtx.state === 'suspended') audioCtx.resume(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(freq, audioCtx.currentTime); g.gain.setValueAtTime(0.001, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.06, audioCtx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur+0.01); }
    function updateHud() { scoreEl.textContent = `分数：${score}`; timerEl.textContent = `时间：${Math.max(0, Math.ceil(timeLeft))}`; bestEl.textContent = `最高：${best}`; }
    function resetGame() { score = 0; timeLeft = 30; playing = true; target.x = 270; target.y = 300; target.vx = 140 + Math.random() * 80; target.vy = 150 + Math.random() * 90; pops.length = 0; lastTick = performance.now(); updateHud(); }
    function moveTarget(dt) { target.x += target.vx * dt; target.y += target.vy * dt; if (target.x < target.r || target.x > canvas.width - target.r) target.vx *= -1; if (target.y < target.r + 40 || target.y > canvas.height - target.r - 40) target.vy *= -1; }
    function addPop(x, y, text, color) { pops.push({ x, y, text, color, life: 0.8 }); }
    function clickAt(clientX, clientY) { const rect = canvas.getBoundingClientRect(); const x = (clientX - rect.left) * (canvas.width / rect.width); const y = (clientY - rect.top) * (canvas.height / rect.height); if (!playing) return; const d = Math.hypot(x - target.x, y - target.y); if (d <= target.r) { let gain = 10; if (d < target.r * 0.2) gain = 50; else if (d < target.r * 0.45) gain = 30; else if (d < target.r * 0.7) gain = 20; score += gain; addPop(x, y, `+${gain}`, '#fef08a'); target.x = 90 + Math.random() * (canvas.width - 180); target.y = 120 + Math.random() * (canvas.height - 260); target.vx *= 1.03; target.vy *= 1.03; if (score > best) { best = score; localStorage.setItem(BEST_KEY, String(best)); } } else addPop(x, y, 'miss', '#fecaca'); updateHud(); }
    canvas.addEventListener('click', (e) => clickAt(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => { const t = e.changedTouches[0]; clickAt(t.clientX, t.clientY); e.preventDefault(); }, { passive: false });
    restartBtn.addEventListener('click', resetGame);
    function drawTarget() { const rings = [1, 0.75, 0.5, 0.25]; const colors = ['#ef4444', '#fff', '#2563eb', '#facc15']; for (let i = 0; i < rings.length; i++) { ctx.fillStyle = colors[i]; ctx.beginPath(); ctx.arc(target.x, target.y, target.r * rings[i], 0, Math.PI * 2); ctx.fill(); } ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(target.x - target.r - 20, target.y); ctx.lineTo(target.x + target.r + 20, target.y); ctx.moveTo(target.x, target.y - target.r - 20); ctx.lineTo(target.x, target.y + target.r + 20); ctx.stroke(); }
    function drawScene() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#fff'; for (let i = 0; i < 8; i++) ctx.fillRect(0, 680 + i * 36, canvas.width, 18); ctx.fillStyle = '#166534'; ctx.fillRect(0, 700, canvas.width, 260); drawTarget(); pops.forEach((p) => { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.font = 'bold 28px Arial'; ctx.fillText(p.text, p.x - 18, p.y - (1 - p.life) * 50); ctx.globalAlpha = 1; }); if (!playing) { ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 46px Arial'; ctx.fillText('时间到', canvas.width / 2, canvas.height / 2 - 30); ctx.font = '26px Arial'; ctx.fillText(`本局得分：${score}`, canvas.width / 2, canvas.height / 2 + 20); ctx.fillText('点“重新开始”再来一局', canvas.width / 2, canvas.height / 2 + 62); ctx.textAlign = 'left'; } }
    function loop(now) { const dt = Math.min(0.033, (now - lastTick) / 1000); lastTick = now; if (playing) { timeLeft -= dt; if (timeLeft <= 0) { timeLeft = 0; playing = false; } moveTarget(dt); } for (let i = pops.length - 1; i >= 0; i--) { pops[i].life -= dt; if (pops[i].life <= 0) pops.splice(i, 1); } updateHud(); drawScene(); requestAnimationFrame(loop); }
    updateHud(); requestAnimationFrame(loop);
  </script>
</body>
</html>
