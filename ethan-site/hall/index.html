<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成就树与徽章大厅</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg1:#312e81; --bg2:#0f172a; --bg3:#020617; --panel:rgba(255,255,255,.08); --border:rgba(255,255,255,.12); --text:#cbd5e1;
    }
    body { margin: 0; min-height: 100vh; font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; background: radial-gradient(circle at top, var(--bg1), var(--bg2) 60%, var(--bg3) 100%); color: white; padding: 24px; }
    .wrap { width: min(1100px, 100%); margin: 0 auto; }
    .hero, .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 18px; backdrop-filter: blur(12px); }
    h1, h2 { margin-top: 0; }
    .sub { color: var(--text); line-height: 1.7; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 16px; }
    .card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 18px; padding: 16px; }
    .name { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
    .score { color: #fde68a; font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    .desc { color: var(--text); font-size: 14px; line-height: 1.6; }
    .badges, .skins { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .badge, .skin { background: rgba(59,130,246,.18); color: #dbeafe; padding: 8px 12px; border-radius: 999px; font-size: 13px; }
    .tree { display: grid; gap: 12px; margin-top: 14px; }
    .node { padding: 14px 16px; border-radius: 18px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); }
    .node strong { display: block; margin-bottom: 6px; }
    .locked { opacity: .45; }
    .progress { margin-top: 8px; font-size: 13px; color: #bfdbfe; }
    .back { display: inline-block; margin-top: 10px; color: #93c5fd; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>🏆 成就树与徽章大厅</h1>
      <div class="sub">这里会读取你浏览器本地记录的成绩，生成属于你自己的 Ethan Arcade 战绩、成就称号和主题皮肤解锁状态。</div>
      <a class="back" href="/ethan/">← 返回 Ethan 首页</a>
    </div>

    <div class="panel">
      <h2>总积分与总称号</h2>
      <div class="grid" id="summary"></div>
    </div>

    <div class="panel">
      <h2>本地排行榜</h2>
      <div class="grid" id="board"></div>
    </div>

    <div class="panel">
      <h2>成就树（进阶版）</h2>
      <div class="tree" id="tree"></div>
    </div>

    <div class="panel">
      <h2>已解锁徽章</h2>
      <div class="badges" id="badges"></div>
    </div>

    <div class="panel">
      <h2>皮肤系统（已生效主题）</h2>
      <div class="skins" id="skins"></div>
      <div class="sub" style="margin-top:12px;">首页会根据你当前已解锁的最高等级主题自动切换视觉风格。</div>
    </div>
  </div>

  <script>
    const items = [
      { key: 'simple-counter-value', name: '计数器', type: 'value', desc: '当前计数值' },
      { key: 'ethan-target-best', name: '射靶', type: 'score', desc: '最高命中得分' },
      { key: 'ethan-balloon-best', name: '弹弓打气球', type: 'score', desc: '最高打爆分数' },
      { key: 'ethan-dodge-best', name: '躲避', type: 'time', desc: '最佳存活时间' },
      { key: 'ethan-relax-best', name: '解压', type: 'score', desc: '累计捏爆泡泡数' },
    ];
    const board = document.getElementById('board');
    const summary = document.getElementById('summary');
    const badges = document.getElementById('badges');
    const skins = document.getElementById('skins');
    const tree = document.getElementById('tree');
    function v(key) { return Number(localStorage.getItem(key) || 0); }
    function fmt(item, value) { const num = Number(value || 0); return item.type === 'time' ? `${num.toFixed(1)} 秒` : `${num}`; }
    const rows = items.map(item => ({ ...item, raw: v(item.key), num: v(item.key) })).sort((a, b) => b.num - a.num);
    rows.forEach(item => { const el = document.createElement('div'); el.className = 'card'; el.innerHTML = `<div class="name">${item.name}</div><div class="score">${fmt(item, item.raw)}</div><div class="desc">${item.desc}</div>`; board.appendChild(el); });

    const scores = { target:v('ethan-target-best'), balloon:v('ethan-balloon-best'), dodge:v('ethan-dodge-best'), relax:v('ethan-relax-best'), counter:v('simple-counter-value') };
    const totalScore = Math.floor(scores.target + scores.balloon + scores.relax + scores.counter / 10 + scores.dodge * 5);
    let title = '新手冒险者';
    if (totalScore >= 1200) title = '传说街机王';
    else if (totalScore >= 700) title = '高级挑战者';
    else if (totalScore >= 300) title = '熟练玩家';
    summary.innerHTML = `<div class="card"><div class="name">总积分</div><div class="score">${totalScore}</div><div class="desc">综合各小游戏成绩折算而来</div></div><div class="card"><div class="name">当前总称号</div><div class="score">${title}</div><div class="desc">继续提升战绩可以升级称号</div></div>`;
    const ach = [
      { name:'射靶成长线', now:scores.target, steps:[50,150,300], labels:['新手射手','神射手','传说神射手'] },
      { name:'气球成长线', now:scores.balloon, steps:[60,140,260], labels:['气球杀手','气球统治者','气球终结者'] },
      { name:'生存成长线', now:scores.dodge, steps:[15,35,60], labels:['生存者','生存大师','极限幸存者'] },
      { name:'解压成长线', now:scores.relax, steps:[30,80,160], labels:['解压学徒','解压之王','泡泡毁灭者'] },
      { name:'数值成长线', now:scores.counter, steps:[100,300,1000], labels:['数字狂人','数值掌控者','数字支配者'] },
    ];
    ach.forEach(line => {
      const unlocked = line.steps.filter(s => line.now >= s).length;
      const nextStep = line.steps[unlocked] || line.steps[line.steps.length - 1];
      const el = document.createElement('div');
      el.className = 'node' + (unlocked ? '' : ' locked');
      el.innerHTML = `<strong>${unlocked ? '✅' : '🔒'} ${line.name}</strong><div>${line.labels.map((n,i)=> `${line.now >= line.steps[i] ? '✔' : '○'} ${n}`).join('　')}</div><div class="progress">当前：${line.now} ｜ 下一档：${nextStep}</div>`;
      tree.appendChild(el);
    });

    const unlockedBadges = [];
    if (scores.target >= 150) unlockedBadges.push('🎯 传奇射手');
    if (scores.balloon >= 140) unlockedBadges.push('🎈 爆破达人');
    if (scores.dodge >= 35) unlockedBadges.push('🌀 极限幸存者');
    if (scores.relax >= 80) unlockedBadges.push('🫧 泡泡毁灭者');
    if (scores.counter >= 300) unlockedBadges.push('🔢 数值掌控者');
    if (!unlockedBadges.length) unlockedBadges.push('🌱 初来乍到');
    unlockedBadges.forEach(text => { const el = document.createElement('div'); el.className = 'badge'; el.textContent = text; badges.appendChild(el); });

    const unlockedSkins = [];
    if (scores.target >= 150) unlockedSkins.push('蓝色猎手主题（已生效）');
    if (scores.balloon >= 140) unlockedSkins.push('糖果气球主题');
    if (scores.dodge >= 35) unlockedSkins.push('深空逃生主题');
    if (scores.relax >= 80) unlockedSkins.push('清凉泡泡主题');
    if (!unlockedSkins.length) unlockedSkins.push('默认主题');
    unlockedSkins.forEach(text => { const el = document.createElement('div'); el.className = 'skin'; el.textContent = text; skins.appendChild(el); });
  </script>
<script>
    const target = Number(localStorage.getItem('ethan-target-best') || 0);
    const balloon = Number(localStorage.getItem('ethan-balloon-best') || 0);
    const dodge = Number(localStorage.getItem('ethan-dodge-best') || 0);
    const relax = Number(localStorage.getItem('ethan-relax-best') || 0);
    let theme = 'default';
    if (target >= 150) theme = 'hunter';
    else if (balloon >= 140) theme = 'candy';
    else if (dodge >= 35) theme = 'space';
    else if (relax >= 80) theme = 'bubble';
    const root = document.documentElement;
    const themes = {
      default: { bg1:'#312e81', bg2:'#0f172a', bg3:'#020617', panel:'rgba(255,255,255,.08)', border:'rgba(255,255,255,.12)', text:'#cbd5e1' },
      hunter: { bg1:'#1d4ed8', bg2:'#0f172a', bg3:'#172554', panel:'rgba(59,130,246,.16)', border:'rgba(147,197,253,.22)', text:'#dbeafe' },
      candy: { bg1:'#db2777', bg2:'#7c3aed', bg3:'#312e81', panel:'rgba(244,114,182,.16)', border:'rgba(251,207,232,.22)', text:'#fce7f3' },
      space: { bg1:'#0f172a', bg2:'#111827', bg3:'#312e81', panel:'rgba(99,102,241,.16)', border:'rgba(165,180,252,.22)', text:'#e0e7ff' },
      bubble: { bg1:'#0891b2', bg2:'#164e63', bg3:'#082f49', panel:'rgba(34,211,238,.14)', border:'rgba(165,243,252,.22)', text:'#cffafe' },
    };
    const cfg = themes[theme];
    root.style.setProperty('--bg1', cfg.bg1);
    root.style.setProperty('--bg2', cfg.bg2);
    root.style.setProperty('--bg3', cfg.bg3);
    root.style.setProperty('--panel', cfg.panel);
    root.style.setProperty('--border', cfg.border);
    root.style.setProperty('--text', cfg.text);
  </script>
</body>
</html>
