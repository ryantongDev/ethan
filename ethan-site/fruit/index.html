<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>水果忍者风</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; min-height:100vh; background:linear-gradient(180deg,#08111f,#0f172a 40%,#14532d 78%,#166534); font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif; color:#fff; display:flex; justify-content:center; align-items:center; padding:16px; }
    .wrap{width:min(100%,560px)} .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#dcfce7}
    .title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#bbf7d0;font-size:13px;margin-bottom:12px}
    canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#1e3a8a 0%,#38bdf8 35%,#86efac 36%,#14532d 100%);border:2px solid rgba(255,255,255,.35);box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="badge" id="score">分数：0</div><div class="badge" id="best">最高：0</div><div class="badge" id="time">时间：30</div></div>
  <div class="title">水果忍者风</div><div class="sub">切开水果、爆汁飞溅，整体更接近水果忍者风格</div>
  <canvas id="game" width="540" height="960"></canvas>
  <div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div>
</div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),timeEl=document.getElementById('time');let score=0,best=Number(localStorage.getItem('ethan-fruit-best')||0),time=30,last=performance.now(),over=false,trail=[],fruits=[],splashes=[],halves=[];
function hud(){scoreEl.textContent=`分数：${score}`;bestEl.textContent=`最高：${best}`;timeEl.textContent=`时间：${Math.ceil(time)}`;}
function fruitType(){ const list=['watermelon','orange','lemon','apple','kiwi']; return list[Math.floor(Math.random()*list.length)]; }
function spawn(){fruits.push({x:80+Math.random()*380,y:1030,w:54+Math.random()*16,h:40+Math.random()*10,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,hit:false,rot:(Math.random()-.5)*0.6,vr:(Math.random()-.5)*1.2,type:fruitType()});}
for(let i=0;i<4;i++)spawn();
function reset(){score=0;time=30;over=false;fruits=[];trail=[];splashes=[];halves=[];for(let i=0;i<4;i++)spawn();hud();}
function point(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}
function addTrail(e){const p=point(e);trail.push({...p,life:0.28});if(trail.length>10)trail.shift();e.preventDefault();}
c.addEventListener('mousemove',addTrail);c.addEventListener('touchmove',addTrail,{passive:false});c.addEventListener('touchstart',addTrail,{passive:false});document.getElementById('restart').addEventListener('click',reset);
function slashFruit(f){for(let i=0;i<10;i++)splashes.push({x:f.x,y:f.y,vx:(Math.random()-.5)*260,vy:(Math.random()-.5)*220,life:.8,color:'#ef4444'});halves.push({x:f.x-10,y:f.y,w:f.w*0.52,h:f.h,rot:f.rot,vr:-2.2,vx:-120,vy:-220,life:0.8,side:-1,type:f.type});halves.push({x:f.x+10,y:f.y,w:f.w*0.52,h:f.h,rot:f.rot,vr:2.2,vx:120,vy:-220,life:0.8,side:1,type:f.type});}
function update(dt){if(over)return;time-=dt;if(time<=0){time=0;over=true;}while(fruits.length<5)spawn();fruits.forEach(f=>{f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=540*dt;f.rot+=f.vr*dt;if(f.y>1100){Object.assign(f,{x:80+Math.random()*380,y:1030,w:54+Math.random()*16,h:40+Math.random()*10,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,hit:false,rot:(Math.random()-.5)*0.6,vr:(Math.random()-.5)*1.2,type:fruitType()});}});trail.forEach(t=>t.life-=dt);trail=trail.filter(t=>t.life>0);splashes.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;});splashes=splashes.filter(s=>s.life>0);halves.forEach(h=>{h.x+=h.vx*dt;h.y+=h.vy*dt;h.vy+=480*dt;h.rot+=h.vr*dt;h.life-=dt;});halves=halves.filter(h=>h.life>0);
for(const f of fruits){if(f.hit)continue;for(const t of trail){const dx=(t.x-f.x)/f.w, dy=(t.y-f.y)/f.h; if((dx*dx+dy*dy)<0.22){f.hit=true;score+=10;if(score>best){best=score;localStorage.setItem('ethan-fruit-best',String(best));}slashFruit(f);setTimeout(()=>Object.assign(f,{x:80+Math.random()*380,y:1030,w:54+Math.random()*16,h:40+Math.random()*10,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,hit:false,rot:(Math.random()-.5)*0.6,vr:(Math.random()-.5)*1.2}),160);break;}}}hud();}
function drawWhole(f){ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.rot); if(f.type==='watermelon'){ctx.beginPath();ctx.moveTo(-f.w*0.9,0);ctx.quadraticCurveTo(-f.w*0.65,-f.h*1.05,0,-f.h*1.02);ctx.quadraticCurveTo(f.w*0.72,-f.h*0.92,f.w*0.95,0);ctx.quadraticCurveTo(f.w*0.72,f.h*0.92,0,f.h*1.02);ctx.quadraticCurveTo(-f.w*0.65,f.h*1.05,-f.w*0.9,0);ctx.closePath();ctx.fillStyle='#166534';ctx.fill();ctx.strokeStyle='#4ade80';ctx.lineWidth=5;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*9-f.w*0.18,-f.h*0.78);ctx.quadraticCurveTo(i*6,0,i*9-f.w*0.18,f.h*0.78);ctx.stroke();}} else if(f.type==='orange'){ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(0,0,f.h*0.95,0,Math.PI*2);ctx.fill();} else if(f.type==='lemon'){ctx.fillStyle='#facc15';ctx.beginPath();ctx.ellipse(0,0,f.w*0.75,f.h*0.78,0,0,Math.PI*2);ctx.fill();} else if(f.type==='apple'){ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,0,f.h*0.92,0,Math.PI*2);ctx.fill();ctx.fillStyle='#166534';ctx.fillRect(-2,-f.h-8,4,12);} else if(f.type==='kiwi'){ctx.fillStyle='#a16207';ctx.beginPath();ctx.arc(0,0,f.h*0.92,0,Math.PI*2);ctx.fill();ctx.fillStyle='#84cc16';ctx.beginPath();ctx.arc(0,0,f.h*0.7,0,Math.PI*2);ctx.fill();} ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.ellipse(-f.w*0.12,-f.h*0.18,f.w*0.14,f.h*0.12,-0.2,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawHalf(h){ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.rot);ctx.scale(h.side,1); if(h.type==='watermelon'){ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(0,0,h.h,-Math.PI/2,Math.PI/2);ctx.lineTo(0,h.h);ctx.lineTo(0,-h.h);ctx.closePath();ctx.fill();ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,0,h.h*0.82,-Math.PI/2,Math.PI/2);ctx.lineTo(0,h.h*0.82);ctx.lineTo(0,-h.h*0.82);ctx.closePath();ctx.fill();ctx.fillStyle='#111827';for(let i=-2;i<=2;i++){ctx.beginPath();ctx.ellipse(h.h*0.35,i*9,3,5,0,0,Math.PI*2);ctx.fill();}} else if(h.type==='apple'){ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,0,h.h*0.92,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fef3c7';ctx.beginPath();ctx.arc(0,0,h.h*0.66,0,Math.PI*2);ctx.fill();ctx.fillStyle='#92400e';ctx.fillRect(h.h*0.06,-h.h*0.18,6,h.h*0.36);ctx.beginPath();ctx.ellipse(h.h*0.18,-h.h*0.16,4,7,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(h.h*0.18,h.h*0.16,4,7,0,0,Math.PI*2);ctx.fill();} else if(h.type==='orange'){ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(0,0,h.h*0.92,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fdba74';ctx.beginPath();ctx.arc(0,0,h.h*0.72,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff7ed';ctx.lineWidth=2;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(h.h*0.62, i*8);ctx.stroke();}} else if(h.type==='lemon'){ctx.fillStyle='#facc15';ctx.beginPath();ctx.ellipse(0,0,h.h*0.95,h.h*0.78,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fef08a';ctx.beginPath();ctx.ellipse(0,0,h.h*0.72,h.h*0.58,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff7ae';ctx.lineWidth=2;for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(h.h*0.58, i*10);ctx.stroke();}} else if(h.type==='kiwi'){ctx.fillStyle='#84cc16';ctx.beginPath();ctx.arc(0,0,h.h*0.88,0,Math.PI*2);ctx.fill();ctx.fillStyle='#dcfce7';ctx.beginPath();ctx.arc(0,0,h.h*0.22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111827';for(let i=0;i<10;i++){const a=(Math.PI*2/10)*i;ctx.beginPath();ctx.ellipse(Math.cos(a)*h.h*0.45,Math.sin(a)*h.h*0.45,2.5,4, a,0,Math.PI*2);ctx.fill();}} ctx.restore();}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.18)';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(90+i*100,120+(i%2)*26,26,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.arc(430,140,80,0,Math.PI*2);ctx.fill();ctx.fillStyle='#14532d';ctx.fillRect(0,760,c.width,200);ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(0,736,c.width,28);fruits.forEach(f=>{if(!f.hit)drawWhole(f);});halves.forEach(h=>drawHalf(h));splashes.forEach(s=>{ctx.globalAlpha=Math.max(0,s.life);ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,6,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});for(let i=1;i<trail.length;i++){ctx.strokeStyle=`rgba(255,255,255,${trail[i].life*2})`;ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();}if(over){ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 46px Arial';ctx.fillText('时间到',c.width/2,c.height/2-20);ctx.font='26px Arial';ctx.fillText(`本局分数：${score}`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}hud();requestAnimationFrame(loop);
</script>
</body>
</html>
