<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>切西瓜</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; min-height:100vh; background:linear-gradient(180deg,#08111f,#0f172a 40%,#14532d 78%,#166534); font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif; color:#fff; display:flex; justify-content:center; align-items:center; padding:16px; }
    .wrap{width:min(100%,560px)} .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#dcfce7}
    .title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#bbf7d0;font-size:13px;margin-bottom:12px}
    canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#1e3a8a 0%,#38bdf8 35%,#86efac 36%,#14532d 100%);border:2px solid rgba(255,255,255,.35);box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="badge" id="score">分数：0</div><div class="badge" id="best">最高：0</div><div class="badge" id="time">时间：30</div></div>
  <div class="title">切西瓜</div><div class="sub">手指划过水果就算切中，30 秒内尽量多切，观感升级版</div>
  <canvas id="game" width="540" height="960"></canvas>
  <div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div>
</div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),timeEl=document.getElementById('time');let score=0,best=Number(localStorage.getItem('ethan-fruit-best')||0),time=30,last=performance.now(),over=false,trail=[],fruits=[],splashes=[];
function hud(){scoreEl.textContent=`分数：${score}`;bestEl.textContent=`最高：${best}`;timeEl.textContent=`时间：${Math.ceil(time)}`;}
function randomFruit(){const list=[{kind:'watermelon',skin:'#16a34a',flesh:'#ef4444',seed:'#111827',leaf:'#22c55e'},{kind:'orange',skin:'#f59e0b',flesh:'#fb923c',seed:'#fff7ed',leaf:'#65a30d'},{kind:'kiwi',skin:'#a16207',flesh:'#84cc16',seed:'#111827',leaf:'#65a30d'},{kind:'blueberry',skin:'#2563eb',flesh:'#60a5fa',seed:'#dbeafe',leaf:'#22c55e'}];return list[Math.floor(Math.random()*list.length)];}
function spawn(){const style=randomFruit();fruits.push({x:60+Math.random()*420,y:1030,r:30+Math.random()*20,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,style,hit:false,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*2});}
for(let i=0;i<4;i++)spawn();
function reset(){score=0;time=30;over=false;fruits=[];trail=[];splashes=[];for(let i=0;i<4;i++)spawn();hud();}
function point(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}
function addTrail(e){const p=point(e);trail.push({...p,life:0.28});if(trail.length>10)trail.shift();e.preventDefault();}
c.addEventListener('mousemove',addTrail);c.addEventListener('touchmove',addTrail,{passive:false});c.addEventListener('touchstart',addTrail,{passive:false});document.getElementById('restart').addEventListener('click',reset);
function slashFruit(f){for(let i=0;i<10;i++)splashes.push({x:f.x,y:f.y,vx:(Math.random()-.5)*260,vy:(Math.random()-.5)*220,life:.8,color:f.style.flesh});}
function update(dt){if(over)return;time-=dt;if(time<=0){time=0;over=true;}while(fruits.length<5)spawn();fruits.forEach(f=>{f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=540*dt;f.rot+=f.vr*dt;if(f.y>1100){Object.assign(f,{x:60+Math.random()*420,y:1030,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,hit:false,style:randomFruit(),rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*2});}});trail.forEach(t=>t.life-=dt);trail=trail.filter(t=>t.life>0);splashes.forEach(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;});splashes=splashes.filter(s=>s.life>0);
for(const f of fruits){if(f.hit)continue;for(const t of trail){if(Math.hypot(t.x-f.x,t.y-f.y)<f.r){f.hit=true;score+=10;if(score>best){best=score;localStorage.setItem('ethan-fruit-best',String(best));}slashFruit(f);setTimeout(()=>Object.assign(f,{x:60+Math.random()*420,y:1030,vx:(Math.random()-.5)*130,vy:-760-Math.random()*180,hit:false,style:randomFruit(),rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*2}),140);break;}}}hud();}
function drawFruit(f){ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.rot);ctx.fillStyle=f.style.skin;ctx.beginPath();ctx.arc(0,0,f.r,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.style.flesh;ctx.beginPath();ctx.arc(0,0,f.r*0.82,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.style.seed;for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i;ctx.beginPath();ctx.arc(Math.cos(a)*f.r*0.42,Math.sin(a)*f.r*0.42,Math.max(2,f.r*0.06),0,Math.PI*2);ctx.fill();}ctx.fillStyle=f.style.leaf;ctx.beginPath();ctx.ellipse(0,-f.r*0.95,f.r*0.18,f.r*0.1,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(-f.r*0.25,-f.r*0.25,f.r*0.22,0,Math.PI*2);ctx.fill();ctx.restore();}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.18)';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(90+i*100,120+(i%2)*26,26,0,Math.PI*2);ctx.fill();}ctx.fillStyle='rgba(255,255,255,.08)';ctx.beginPath();ctx.arc(430,140,80,0,Math.PI*2);ctx.fill();ctx.fillStyle='#14532d';ctx.fillRect(0,760,c.width,200);fruits.forEach(f=>{if(!f.hit)drawFruit(f);});splashes.forEach(s=>{ctx.globalAlpha=Math.max(0,s.life);ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,6,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});for(let i=1;i<trail.length;i++){ctx.strokeStyle=`rgba(255,255,255,${trail[i].life*2})`;ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();}if(over){ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 46px Arial';ctx.fillText('时间到',c.width/2,c.height/2-20);ctx.font='26px Arial';ctx.fillText(`本局分数：${score}`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}hud();requestAnimationFrame(loop);
</script>
</body>
</html>
