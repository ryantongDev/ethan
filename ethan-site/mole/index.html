<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>打地鼠</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#1f2937,#14532d 70%,#166534);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:16px}
    .wrap{width:min(100%,560px)}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#dcfce7}.title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#bbf7d0;font-size:13px;margin-bottom:12px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.hole{aspect-ratio:1/1;border-radius:50%;background:#3f3f46;position:relative;overflow:hidden;border:4px solid #57534e}.mole{position:absolute;left:50%;bottom:-62%;transform:translateX(-50%) scale(1);width:70%;height:70%;transition:bottom .15s, transform .15s}.hole.up .mole{bottom:8%;animation:bounce .28s ease}.hole.hit .mole{transform:translateX(-50%) scale(.9) rotate(-10deg)}@keyframes bounce{0%{transform:translateX(-50%) scale(.88)}55%{transform:translateX(-50%) scale(1.06)}100%{transform:translateX(-50%) scale(1)}}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="wrap"><div class="top"><div class="badge" id="score">分数：0</div><div class="badge" id="best">最高：0</div><div class="badge" id="time">时间：30</div></div><div class="title">打地鼠</div><div class="sub">地鼠冒头就点，30 秒内打得越多越好</div><div class="grid" id="grid"></div><div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div></div>
<script>
const grid=document.getElementById('grid'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),timeEl=document.getElementById('time');let score=0,best=Number(localStorage.getItem('ethan-mole-best')||0),time=30,active=-1,over=false,timer=null,stars=[];const variants=[['#a16207','#d6a46b','#7c2d12'],['#92400e','#d6a46b','#7c2d12'],['#78350f','#e7c48f','#7c2d12']];function moleSVG(v,hit=false){const [fur,face,nose]=v;const eye=hit?'x':'o';return `<svg viewBox="0 0 100 100" width="100%" height="100%"><ellipse cx="50" cy="68" rx="28" ry="24" fill="${fur}"/><ellipse cx="50" cy="55" rx="26" ry="24" fill="${fur}"/><ellipse cx="36" cy="33" rx="8" ry="9" fill="${fur}"/><ellipse cx="64" cy="33" rx="8" ry="9" fill="${fur}"/><ellipse cx="36" cy="33" rx="5" ry="6" fill="${face}"/><ellipse cx="64" cy="33" rx="5" ry="6" fill="${face}"/><text x="38" y="56" font-size="10" fill="#111827">${eye}</text><text x="54" y="56" font-size="10" fill="#111827">${eye}</text><ellipse cx="50" cy="63" rx="15" ry="12" fill="${face}"/><ellipse cx="50" cy="62" rx="6" ry="5" fill="${nose}"/><rect x="38" y="72" width="8" height="8" rx="4" fill="#fff"/><rect x="54" y="72" width="8" height="8" rx="4" fill="#fff"/></svg>`;}
const variantsPerHole=[];for(let i=0;i<9;i++){const v=variants[Math.floor(Math.random()*variants.length)];variantsPerHole.push(v);const d=document.createElement('div');d.className='hole';d.innerHTML=`<div class="mole">${moleSVG(v)}</div>`;d.addEventListener('click',()=>hit(i));grid.appendChild(d);}const holes=[...document.querySelectorAll('.hole')];function hud(){scoreEl.textContent=`分数：${score}`;bestEl.textContent=`最高：${best}`;timeEl.textContent=`时间：${Math.ceil(time)}`;}function pop(){if(over)return;holes.forEach(h=>{h.classList.remove('up');h.classList.remove('hit');});active=Math.floor(Math.random()*9);holes[active].querySelector('.mole').innerHTML=moleSVG(variantsPerHole[active]);holes[active].classList.add('up');timer=setTimeout(pop,420+Math.random()*350);}function hit(i){if(over)return;if(i===active){score+=10;if(score>best){best=score;localStorage.setItem('ethan-mole-best',String(best));}const rect=holes[i].getBoundingClientRect();stars.push({i,life:.6});holes[i].classList.add('hit');holes[i].querySelector('.mole').innerHTML=moleSVG(variantsPerHole[i],true);setTimeout(()=>holes[i].classList.remove('up'),120);active=-1;hud();}}
function reset(){score=0;time=30;over=false;active=-1;stars=[];clearTimeout(timer);hud();pop();}document.getElementById('restart').addEventListener('click',reset);setInterval(()=>{if(over)return;time-=1;if(time<=0){time=0;over=true;clearTimeout(timer);holes.forEach(h=>h.classList.remove('up'));}hud();stars=stars.filter(s=>(s.life-=.08)>0);stars.forEach(s=>{const hole=holes[s.i];hole.style.boxShadow='0 0 18px rgba(250,204,21,'+s.life+')';setTimeout(()=>{if(hole)hole.style.boxShadow='';},120);});},1000/6);hud();pop();
</script>
</body>
</html>
