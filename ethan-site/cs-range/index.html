<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CS 风格打靶</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#111827,#1f2937 50%,#0f172a);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:16px}.wrap{width:min(100%,560px)}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#e5e7eb}.title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#cbd5e1;font-size:13px;margin-bottom:12px}canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#4b5563 0%,#374151 34%,#a3a3a3 35%,#44403c 100%);border:2px solid rgba(255,255,255,.25);box-shadow:0 18px 44px rgba(0,0,0,.3)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="wrap"><div class="top"><div class="badge" id="score">分数：0</div><div class="badge" id="head">爆头：0</div><div class="badge" id="difficultyBtn">难度：普通</div><div class="badge" id="time">时间：30</div></div><div class="title">CS 风格打靶</div><div class="sub">练枪版，瞄头加分更高，尽量打出爆头</div><canvas id="game" width="540" height="960"></canvas><div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');const scoreEl=document.getElementById('score'),headEl=document.getElementById('head'),timeEl=document.getElementById('time');let score=0,headshots=0,time=30,last=performance.now(),over=false,target={x:270,y:300,w:90,h:180,vx:150,vy:110},impacts=[];const audioCtx=new (window.AudioContext||window.webkitAudioContext)();function shotSound(head=false){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=head?'triangle':'square';o.frequency.setValueAtTime(head?760:320,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(head?240:120,audioCtx.currentTime+.09);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.07,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.1);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.11);}function hud(){scoreEl.textContent=`分数：${score}`;headEl.textContent=`爆头：${headshots}`;timeEl.textContent=`时间：${Math.ceil(time)}`;}function reset(){score=0;headshots=0;time=30;over=false;target={x:270,y:300,w:90,h:180,vx:150,vy:110};impacts=[];hud();}function pos(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}
function shoot(e){if(over)return;const p=pos(e);const hit = p.x>target.x-target.w/2 && p.x<target.x+target.w/2 && p.y>target.y-target.h/2 && p.y<target.y+target.h/2;if(hit){const isHead=p.y<target.y-target.h*0.12;score+=isHead?20:10;if(isHead)headshots++;shotSound(isHead);impacts.push({x:p.x,y:p.y,life:.4,head:isHead});target.x=100+Math.random()*340;target.y=160+Math.random()*420;}else{impacts.push({x:p.x,y:p.y,life:.25,head:false});shotSound(false);}hud();e.preventDefault();}
c.addEventListener('click',shoot);c.addEventListener('touchstart',shoot,{passive:false});document.getElementById('restart').addEventListener('click',reset);
function update(dt){if(over)return;time-=dt;if(time<=0){time=0;over=true;}target.x+=target.vx*dt;target.y+=target.vy*dt;if(target.x<80||target.x>460)target.vx*=-1;if(target.y<160||target.y>620)target.vy*=-1;impacts.forEach(i=>i.life-=dt);impacts=impacts.filter(i=>i.life>0);hud();}
function drawTarget(){ctx.save();ctx.translate(target.x,target.y);ctx.fillStyle='#111827';ctx.fillRect(-target.w/2,-target.h/2,target.w,target.h);ctx.fillStyle='#d1d5db';ctx.fillRect(-target.w*0.22,-target.h/2+24,target.w*0.44,target.h*0.62);ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(0,-target.h*0.22,28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-8,-target.h*0.24,3,0,Math.PI*2);ctx.arc(8,-target.h*0.24,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.moveTo(-36,-target.h*0.22);ctx.lineTo(36,-target.h*0.22);ctx.moveTo(0,-target.h*0.55);ctx.lineTo(0,target.h*0.4);ctx.stroke();ctx.restore();}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<6;i++)ctx.fillRect(40+i*80,140,40,520);ctx.fillStyle='#52525b';ctx.fillRect(0,720,c.width,240);drawTarget();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(270,430);ctx.lineTo(270,470);ctx.moveTo(250,450);ctx.lineTo(290,450);ctx.stroke();impacts.forEach(i=>{ctx.globalAlpha=i.life*2;ctx.strokeStyle=i.head?'#facc15':'#f8fafc';ctx.beginPath();ctx.arc(i.x,i.y,i.head?18:12,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;});if(over){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 44px Arial';ctx.fillText('训练结束',c.width/2,c.height/2-24);ctx.font='24px Arial';ctx.fillText(`分数：${score} ｜ 爆头：${headshots}`,c.width/2,c.height/2+22);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}hud();requestAnimationFrame(loop);
const difficultyBtn = document.getElementById('difficultyBtn'); let difficulty = localStorage.getItem('ethan-cs-range-difficulty') || 'normal'; const diffLabelMap={easy:'简单',normal:'普通',hard:'困难'}; if(difficultyBtn){ difficultyBtn.textContent='难度：'+diffLabelMap[difficulty]; difficultyBtn.addEventListener('click',()=>{ difficulty = difficulty==='easy'?'normal':difficulty==='normal'?'hard':'easy'; localStorage.setItem('ethan-cs-range-difficulty', difficulty); difficultyBtn.textContent='难度：'+diffLabelMap[difficulty]; location.reload(); }); }
</script>
</body>
</html>
