<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CS 风格轻量对枪</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:linear-gradient(180deg,#111827,#1f2937 45%,#0f172a);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:16px}.wrap{width:min(100%,560px)}.top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#e5e7eb}.title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#cbd5e1;font-size:13px;margin-bottom:12px}canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#6b7280 0%,#374151 45%,#44403c 46%,#292524 100%);border:2px solid rgba(255,255,255,.25);box-shadow:0 18px 44px rgba(0,0,0,.3)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>
<div class="wrap"><div class="top"><div class="badge" id="playerHp">你：100</div><div class="badge" id="enemyHp">敌人：100</div><div class="badge" id="round">回合：1</div></div><div class="title">CS 风格轻量对枪</div><div class="sub">轻量对枪版，准星点敌人，掩体会挡子弹，先清空对面血量</div><canvas id="game" width="540" height="960"></canvas><div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div></div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');const php=document.getElementById('playerHp'),ehp=document.getElementById('enemyHp'),roundEl=document.getElementById('round');const audioCtx=new (window.AudioContext||window.webkitAudioContext)();function s(freq=240,d=.08){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(freq,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(freq*.5,audioCtx.currentTime+d);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.07,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d+.01);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d+.02);}let player,enemy,round,over,last,impacts;const cover={x:270,y:620,w:110,h:160};function reset(){player={hp:100};enemy={x:400,y:340,w:54,h:110,hp:100,dir:-1,cool:0};round=1;over=false;last=performance.now();impacts=[];hud();}function hud(){php.textContent=`你：${Math.max(0,player.hp)}`;ehp.textContent=`敌人：${Math.max(0,enemy.hp)}`;roundEl.textContent=`回合：${round}`;}function pos(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}function blocked(x1,y1,x2,y2){return Math.min(y1,y2)<cover.y+cover.h/2&&Math.max(y1,y2)>cover.y-cover.h/2&&Math.min(x1,x2)<cover.x+cover.w/2&&Math.max(x1,x2)>cover.x-cover.w/2;}function shoot(e){if(over)return;const p=pos(e);impacts.push({x:p.x,y:p.y,life:.3,good:false});const hit=p.x>enemy.x-enemy.w/2&&p.x<enemy.x+enemy.w/2&&p.y>enemy.y-enemy.w/2&&p.y<enemy.y+enemy.h/2&&!blocked(270,900,p.x,p.y);if(hit){enemy.hp-=20;impacts[impacts.length-1].good=true;s(720,.08);if(enemy.hp<=0){round++;enemy.hp=100;enemy.x=120+Math.random()*300;player.hp=Math.min(100,player.hp+20);} } else s(200,.05);hud();e.preventDefault();}
c.addEventListener('click',shoot);c.addEventListener('touchstart',shoot,{passive:false});document.getElementById('restart').addEventListener('click',reset);function update(dt){if(over)return;enemy.cool-=dt;enemy.x+=enemy.dir*90*dt;if(enemy.x<120||enemy.x>430)enemy.dir*=-1;if(enemy.cool<=0){enemy.cool=1.1+Math.random()*.5;const hit=Math.random()>.35;if(hit&&!blocked(enemy.x,enemy.y,270,900)){player.hp-=10;s(110,.12);if(player.hp<=0)over=true;}else s(160,.05);}impacts.forEach(i=>i.life-=dt);impacts=impacts.filter(i=>i.life>0);hud();}
function drawEnemy(){ctx.fillStyle='#111827';ctx.fillRect(enemy.x-enemy.w/2,enemy.y-enemy.h/2,enemy.w,enemy.h);ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(enemy.x,enemy.y-enemy.h*0.22,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#d1d5db';ctx.fillRect(enemy.x-enemy.w*0.18,enemy.y-enemy.h*0.05,enemy.w*0.36,enemy.h*0.45);}function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<6;i++)ctx.fillRect(30+i*80,120,40,500);ctx.fillStyle='#57534e';ctx.fillRect(0,760,c.width,200);ctx.fillStyle='#374151';ctx.fillRect(cover.x-cover.w/2,cover.y-cover.h/2,cover.w,cover.h);drawEnemy();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(270,430);ctx.lineTo(270,470);ctx.moveTo(250,450);ctx.lineTo(290,450);ctx.stroke();impacts.forEach(i=>{ctx.globalAlpha=i.life*2;ctx.strokeStyle=i.good?'#22c55e':'#f8fafc';ctx.beginPath();ctx.arc(i.x,i.y,i.good?18:10,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;});if(over){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 44px Arial';ctx.fillText('你被击倒了',c.width/2,c.height/2-20);ctx.font='24px Arial';ctx.fillText(`撑到了第 ${round} 回合`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}reset();requestAnimationFrame(loop);
</script>
</body>
</html>
