<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CS 风格轻量对枪</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#111827,#1f2937 45%,#0f172a);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:16px}
    .wrap{width:min(100%,560px)}
    .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#e5e7eb}
    .title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#cbd5e1;font-size:13px;margin-bottom:12px}
    canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#6b7280 0%,#374151 45%,#44403c 46%,#292524 100%);border:2px solid rgba(255,255,255,.25);box-shadow:0 18px 44px rgba(0,0,0,.3)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
    .tip{text-align:center;color:#bfdbfe;font-size:12px;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge" id="playerHp">你：100</div>
    <div class="badge" id="enemyHp">敌人：100</div>
    <div class="badge" id="difficultyBtn">难度：普通</div>
    <div class="badge" id="round">回合：1</div>
  </div>
  <div class="title">CS 风格轻量对枪</div>
  <div class="sub">直接点敌人射击，先做成稳定可玩的触屏版</div>
  <canvas id="game" width="540" height="960"></canvas>
  <div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div>
  <div class="tip">直接点敌人就会掉血，点头部会触发爆头，伤害更高。</div>
</div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
const php=document.getElementById('playerHp'),ehp=document.getElementById('enemyHp'),roundEl=document.getElementById('round'),difficultyBtn=document.getElementById('difficultyBtn');
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function s(freq=240,d=.08){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(freq,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(freq*.5,audioCtx.currentTime+d);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.07,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d+.01);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d+.02);}
const difficultyMap={easy:{label:'简单',enemyHp:72,enemyHit:7,enemyFireMin:1.6,enemyFireMax:2.2,healOnWin:26,enemyMove:66},normal:{label:'普通',enemyHp:100,enemyHit:10,enemyFireMin:1.1,enemyFireMax:1.6,healOnWin:20,enemyMove:90},hard:{label:'困难',enemyHp:128,enemyHit:14,enemyFireMin:0.75,enemyFireMax:1.1,healOnWin:12,enemyMove:120}};
let difficulty=localStorage.getItem('ethan-cs-duel-difficulty')||'normal';
function cfg(){return difficultyMap[difficulty]||difficultyMap.normal;}
function refreshDifficulty(){difficultyBtn.textContent='难度：'+cfg().label;}
let player,enemy,round,over,last,impacts;
const cover={x:270,y:620,w:110,h:160};
function reset(){player={hp:100};enemy={x:400,y:340,w:54,h:110,hp:cfg().enemyHp,dir:-1,cool:1.3,hitFlash:0};round=1;over=false;last=performance.now();impacts=[];refreshDifficulty();hud();}
function hud(){php.textContent=`你：${Math.max(0,player.hp)}`;ehp.textContent=`敌人：${Math.max(0,enemy.hp)}`;roundEl.textContent=`回合：${round}`;}
function pos(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}
function blocked(x1,y1,x2,y2){return Math.min(y1,y2)<cover.y+cover.h/2&&Math.max(y1,y2)>cover.y-cover.h/2&&Math.min(x1,x2)<cover.x+cover.w/2&&Math.max(x1,x2)>cover.x-cover.w/2;}
function fire(aimPoint){if(over)return;const p=aimPoint;impacts.push({x:p.x,y:p.y,life:.3,good:false,head:false});const hitBoxPad = difficulty === 'easy' ? 44 : difficulty === 'normal' ? 32 : 20; const hit=p.x>enemy.x-enemy.w/2-hitBoxPad&&p.x<enemy.x+enemy.w/2+hitBoxPad&&p.y>enemy.y-enemy.h/2-hitBoxPad&&p.y<enemy.y+enemy.h/2+hitBoxPad; const headshot = p.x>enemy.x-28-hitBoxPad*0.3&&p.x<enemy.x+28+hitBoxPad*0.3&&p.y>enemy.y-enemy.h*0.52-hitBoxPad*0.3&&p.y<enemy.y-enemy.h*0.05+hitBoxPad*0.3; if(hit){const damage = headshot ? 40 : 20; enemy.hp-=damage; enemy.hitFlash=0.18; impacts[impacts.length-1].good=true; impacts[impacts.length-1].head=headshot; s(headshot?920:720,.08); if(enemy.hp<=0){round++;localStorage.setItem('ethan-cs-duel-best', String(Math.max(round, Number(localStorage.getItem('ethan-cs-duel-best')||0))));enemy.hp=cfg().enemyHp;enemy.x=120+Math.random()*300;player.hp=Math.min(100,player.hp+cfg().healOnWin);}}else s(200,.05);hud();}
function tapFire(e){ const p = pos(e.changedTouches ? { touches:[e.changedTouches[0]] } : e); fire(p); e.preventDefault(); }
c.addEventListener('click',tapFire);
c.addEventListener('touchend',tapFire,{passive:false});
document.getElementById('restart').addEventListener('click',reset);
difficultyBtn.addEventListener('click',()=>{difficulty=difficulty==='easy'?'normal':difficulty==='normal'?'hard':'easy';localStorage.setItem('ethan-cs-duel-difficulty',difficulty);reset();});
function update(dt){if(over)return;enemy.cool-=dt;enemy.hitFlash=Math.max(0, enemy.hitFlash-dt); enemy.x+=enemy.dir*cfg().enemyMove*dt;if(enemy.x<120||enemy.x>430)enemy.dir*=-1;if(enemy.cool<=0){enemy.cool=cfg().enemyFireMin+Math.random()*(cfg().enemyFireMax-cfg().enemyFireMin);const hit=Math.random()>.42;if(hit&&!blocked(enemy.x,enemy.y,270,900)){player.hp-=cfg().enemyHit;s(110,.12);if(player.hp<=0)over=true;}else s(160,.05);}impacts.forEach(i=>i.life-=dt);impacts=impacts.filter(i=>i.life>0);hud();}
function drawEnemy(){ctx.save();ctx.translate(enemy.x + (enemy.hitFlash>0?Math.sin(performance.now()*0.12)*4:0),enemy.y);ctx.fillStyle='#111827';ctx.fillRect(-enemy.w/2,-enemy.h/2,enemy.w,enemy.h);ctx.fillStyle='#f3c7a7';ctx.beginPath();ctx.arc(0,-enemy.h*0.24,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#334155';ctx.fillRect(-16,-enemy.h*0.48,32,8);ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(-6,-enemy.h*0.27,2.5,0,Math.PI*2);ctx.arc(6,-enemy.h*0.27,2.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#7f1d1d';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-enemy.h*0.21,8,0.15*Math.PI,0.85*Math.PI);ctx.stroke();ctx.fillStyle=enemy.hitFlash>0?'#fca5a5':'#cbd5e1';ctx.fillRect(-14,-enemy.h*0.02,28,42);ctx.fillStyle='#475569';ctx.fillRect(-18,-6,36,14);ctx.fillStyle='#334155';ctx.fillRect(-enemy.w*0.34,8,enemy.w*0.68,enemy.h*0.28);ctx.fillStyle='#111827';ctx.fillRect(-enemy.w*0.24,enemy.h*0.18,10,28);ctx.fillRect(enemy.w*0.08,enemy.h*0.18,10,28);ctx.fillStyle='#475569';ctx.fillRect(-enemy.w*0.36,-6,10,34);ctx.fillRect(enemy.w*0.26,-6,10,34);ctx.fillStyle='#94a3b8';ctx.fillRect(18,-10,18,6);ctx.restore();}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<6;i++)ctx.fillRect(30+i*80,120,40,500);ctx.fillStyle='#57534e';ctx.fillRect(0,760,c.width,200);ctx.fillStyle='#374151';ctx.fillRect(cover.x-cover.w/2,cover.y-cover.h/2,cover.w,cover.h);drawEnemy();impacts.forEach(i=>{ctx.globalAlpha=i.life*2;ctx.strokeStyle=i.head?'#facc15':(i.good?'#22c55e':'#f8fafc');ctx.beginPath();ctx.arc(i.x,i.y,i.head?22:(i.good?18:10),0,Math.PI*2);ctx.stroke(); if(i.head){ ctx.fillStyle='#fde68a'; ctx.font='bold 18px Arial'; ctx.fillText('爆头', i.x-18, i.y-26); } ctx.globalAlpha=1;});if(over){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 44px Arial';ctx.fillText('你被击倒了',c.width/2,c.height/2-20);ctx.font='24px Arial';ctx.fillText(`撑到了第 ${round} 回合`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();requestAnimationFrame(loop)}
reset();requestAnimationFrame(loop);
</script>
</body>
</html>
