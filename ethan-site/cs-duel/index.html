<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CS 风格轻量对枪</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#111827,#1f2937 45%,#0f172a);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:16px}
    .wrap{width:min(100%,560px)}
    .top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
    .badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;font-weight:700;color:#e5e7eb}
    .title{text-align:center;font-size:26px;font-weight:900;margin:4px 0 6px}.sub{text-align:center;color:#cbd5e1;font-size:13px;margin-bottom:12px}
    canvas{width:100%;aspect-ratio:9/16;display:block;border-radius:22px;background:linear-gradient(180deg,#6b7280 0%,#374151 45%,#44403c 46%,#292524 100%);border:2px solid rgba(255,255,255,.25);box-shadow:0 18px 44px rgba(0,0,0,.3)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .btn,.back{border:none;border-radius:16px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);text-decoration:none;display:flex;align-items:center;justify-content:center}
    .tip{text-align:center;color:#bfdbfe;font-size:12px;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="badge" id="playerHp">你：100</div>
    <div class="badge" id="enemyHp">敌人：100</div>
    <div class="badge" id="difficultyBtn">难度：普通</div>
    <div class="badge" id="round">回合：1</div>
  </div>
  <div class="title">CS 风格轻量对枪</div>
  <div class="sub">手指在画面里拖动准星，松手不会开枪，轻点一下才发射</div>
  <canvas id="game" width="540" height="960"></canvas>
  <div class="actions"><a class="back" href="/ethan/">返回首页</a><button class="btn" id="restart">重新开始</button></div>
  <div class="tip">拖动准星瞄准敌人，轻点屏幕开枪。掩体会挡子弹。</div>
</div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
const php=document.getElementById('playerHp'),ehp=document.getElementById('enemyHp'),roundEl=document.getElementById('round'),difficultyBtn=document.getElementById('difficultyBtn');
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function s(freq=240,d=.08){if(audioCtx.state==='suspended')audioCtx.resume();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.setValueAtTime(freq,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(freq*.5,audioCtx.currentTime+d);g.gain.setValueAtTime(.001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.07,audioCtx.currentTime+.01);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d+.01);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d+.02);}
const difficultyMap={easy:{label:'简单',enemyHp:72,enemyHit:7,enemyFireMin:1.6,enemyFireMax:2.2,healOnWin:26,enemyMove:66},normal:{label:'普通',enemyHp:100,enemyHit:10,enemyFireMin:1.1,enemyFireMax:1.6,healOnWin:20,enemyMove:90},hard:{label:'困难',enemyHp:128,enemyHit:14,enemyFireMin:0.75,enemyFireMax:1.1,healOnWin:12,enemyMove:120}};
let difficulty=localStorage.getItem('ethan-cs-duel-difficulty')||'normal';
function cfg(){return difficultyMap[difficulty]||difficultyMap.normal;}
function refreshDifficulty(){difficultyBtn.textContent='难度：'+cfg().label;}
let player,enemy,round,over,last,impacts,crosshair,dragging=false,moved=false,lastTouchEnd=0;
const cover={x:270,y:620,w:110,h:160};
function reset(){player={hp:100};enemy={x:400,y:340,w:54,h:110,hp:cfg().enemyHp,dir:-1,cool:1.3};round=1;over=false;last=performance.now();impacts=[];crosshair={x:270,y:450};dragging=false;moved=false;refreshDifficulty();hud();}
function hud(){php.textContent=`你：${Math.max(0,player.hp)}`;ehp.textContent=`敌人：${Math.max(0,enemy.hp)}`;roundEl.textContent=`回合：${round}`;}
function pos(e){const r=c.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*(c.width/r.width),y:(p.clientY-r.top)*(c.height/r.height)}}
function blocked(x1,y1,x2,y2){return Math.min(y1,y2)<cover.y+cover.h/2&&Math.max(y1,y2)>cover.y-cover.h/2&&Math.min(x1,x2)<cover.x+cover.w/2&&Math.max(x1,x2)>cover.x-cover.w/2;}
function fire(){if(over)return;const p=crosshair;impacts.push({x:p.x,y:p.y,life:.3,good:false});const hitBoxPad = difficulty === 'easy' ? 18 : difficulty === 'normal' ? 10 : 4; const hit=p.x>enemy.x-enemy.w/2-hitBoxPad&&p.x<enemy.x+enemy.w/2+hitBoxPad&&p.y>enemy.y-enemy.h/2-hitBoxPad&&p.y<enemy.y+enemy.h/2+hitBoxPad&&!blocked(270,900,p.x,p.y);if(hit){enemy.hp-=20;impacts[impacts.length-1].good=true;s(720,.08);if(enemy.hp<=0){round++;localStorage.setItem('ethan-cs-duel-best', String(Math.max(round, Number(localStorage.getItem('ethan-cs-duel-best')||0))));enemy.hp=cfg().enemyHp;enemy.x=120+Math.random()*300;player.hp=Math.min(100,player.hp+cfg().healOnWin);}}else s(200,.05);hud();}
function startAim(e){dragging=true;moved=false;const p=pos(e);crosshair.x=p.x;crosshair.y=p.y;e.preventDefault();}
function moveAim(e){if(!dragging)return;const p=pos(e);crosshair.x=Math.max(40,Math.min(c.width-40,p.x));crosshair.y=Math.max(80,Math.min(c.height-80,p.y));moved=true;e.preventDefault();}
function endAim(e){ if(moved){ lastTouchEnd=Date.now(); } dragging=false; e&&e.preventDefault(); }
function tapFire(e){ if(Date.now()-lastTouchEnd < 220){ moved=false; return; } fire(); e.preventDefault(); }
c.addEventListener('mousedown',startAim);c.addEventListener('mousemove',moveAim);window.addEventListener('mouseup',endAim);c.addEventListener('click',tapFire);
c.addEventListener('touchstart',startAim,{passive:false});c.addEventListener('touchmove',moveAim,{passive:false});c.addEventListener('touchend',e=>{ endAim(e); if(!moved) fire(); moved=false; },{passive:false});
document.getElementById('restart').addEventListener('click',reset);
difficultyBtn.addEventListener('click',()=>{difficulty=difficulty==='easy'?'normal':difficulty==='normal'?'hard':'easy';localStorage.setItem('ethan-cs-duel-difficulty',difficulty);reset();});
function update(dt){if(over)return;enemy.cool-=dt;enemy.x+=enemy.dir*cfg().enemyMove*dt;if(enemy.x<120||enemy.x>430)enemy.dir*=-1;if(enemy.cool<=0){enemy.cool=cfg().enemyFireMin+Math.random()*(cfg().enemyFireMax-cfg().enemyFireMin);const hit=Math.random()>.42;if(hit&&!blocked(enemy.x,enemy.y,270,900)){player.hp-=cfg().enemyHit;s(110,.12);if(player.hp<=0)over=true;}else s(160,.05);}impacts.forEach(i=>i.life-=dt);impacts=impacts.filter(i=>i.life>0);hud();}
function drawEnemy(){ctx.fillStyle='#111827';ctx.fillRect(enemy.x-enemy.w/2,enemy.y-enemy.h/2,enemy.w,enemy.h);ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(enemy.x,enemy.y-enemy.h*0.22,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#d1d5db';ctx.fillRect(enemy.x-enemy.w*0.18,enemy.y-enemy.h*0.05,enemy.w*0.36,enemy.h*0.45); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.strokeRect(enemy.x-enemy.w/2,enemy.y-enemy.h/2,enemy.w,enemy.h);}
function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='rgba(255,255,255,.06)';for(let i=0;i<6;i++)ctx.fillRect(30+i*80,120,40,500);ctx.fillStyle='#57534e';ctx.fillRect(0,760,c.width,200);ctx.fillStyle='#374151';ctx.fillRect(cover.x-cover.w/2,cover.y-cover.h/2,cover.w,cover.h);drawEnemy();ctx.strokeStyle='rgba(255,255,255,.75)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(crosshair.x,crosshair.y-20);ctx.lineTo(crosshair.x,crosshair.y+20);ctx.moveTo(crosshair.x-20,crosshair.y);ctx.lineTo(crosshair.x+20,crosshair.y);ctx.stroke();impacts.forEach(i=>{ctx.globalAlpha=i.life*2;ctx.strokeStyle=i.good?'#22c55e':'#f8fafc';ctx.beginPath();ctx.arc(i.x,i.y,i.good?18:10,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;});if(over){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font='bold 44px Arial';ctx.fillText('你被击倒了',c.width/2,c.height/2-20);ctx.font='24px Arial';ctx.fillText(`撑到了第 ${round} 回合`,c.width/2,c.height/2+24);ctx.textAlign='left';}}
function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();requestAnimationFrame(loop)}
reset();requestAnimationFrame(loop);
</script>
</body>
</html>
