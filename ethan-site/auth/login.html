<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Arcade 登录</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background: radial-gradient(circle at top, #1e3a8a, #0f172a 58%, #020617 100%); font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif; color:#fff; padding:20px; }
    .card { width:min(100%,420px); background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); border-radius:24px; padding:24px; backdrop-filter:blur(14px); }
    h1 { margin:0 0 10px; }
    p { color:#cbd5e1; line-height:1.7; }
    input { width:100%; padding:14px 16px; border-radius:16px; border:none; margin:12px 0; font-size:16px; }
    button { width:100%; padding:14px; border:none; border-radius:16px; background:#2563eb; color:#fff; font-size:16px; font-weight:800; }
    .tip { margin-top:12px; color:#93c5fd; font-size:13px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">登录 Ethan Arcade</h1>
    <p id="desc">第一次进入请先设置名字和密码。以后再进就只能输入密码登录。</p>
    <input id="name" placeholder="输入你的名字，例如 Ethan" maxlength="20" />
    <input id="password" type="password" placeholder="设置密码" maxlength="32" />
    <button id="go">继续</button>
    <div class="tip">这是浏览器本地密码，不是后端账号系统，但已经能做到首次设置、后续登录。</div>
  </div>
  <script>
    const nameInput = document.getElementById('name');
    const pwdInput = document.getElementById('password');
    const btn = document.getElementById('go');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');
    const savedName = localStorage.getItem('ethan_arcade_user') || '';
    const savedPwd = localStorage.getItem('ethan_arcade_password');

    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (h << 5) - h + str.charCodeAt(i), h |= 0;
      return String(h);
    }

    if (savedPwd) {
      title.textContent = '输入密码登录';
      desc.textContent = `当前账号：${savedName || '未命名玩家'}，请输入密码继续。`;
      nameInput.classList.add('hidden');
      pwdInput.placeholder = '输入密码';
    } else {
      nameInput.value = savedName;
    }

    btn.addEventListener('click', () => {
      const pwd = pwdInput.value.trim();
      if (!pwd) return alert('请输入密码');

      if (!savedPwd) {
        const name = nameInput.value.trim();
        if (!name) return alert('先输入名字');
        localStorage.setItem('ethan_arcade_user', name);
        localStorage.setItem('ethan_arcade_password', hash(pwd));
        localStorage.setItem('ethan_arcade_authed', '1');
        location.href = '/ethan/';
      } else {
        if (hash(pwd) !== savedPwd) return alert('密码不对');
        localStorage.setItem('ethan_arcade_authed', '1');
        location.href = '/ethan/';
      }
    });
  </script>
</body>
</html>
